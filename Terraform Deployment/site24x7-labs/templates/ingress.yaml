{{- if .Values.ingress.enabled -}}
# =============================================================================
# Ingress — routes traffic to frontend (/) and API (/api/)
# =============================================================================
# The frontend nginx container handles /api/* proxying to the server service,
# so a single route to the frontend is sufficient. If you prefer direct
# routing, uncomment the /api/ rule below.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "site24x7-labs.fullname" . }}
  labels:
    {{- include "site24x7-labs.labels" . | nindent 4 }}
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- if .Values.ingress.className }}
  ingressClassName: {{ .Values.ingress.className }}
  {{- end }}
  {{- if .Values.ingress.tls }}
  tls:
    {{- range .Values.ingress.tls }}
    - hosts:
        {{- range .hosts }}
        - {{ . | quote }}
        {{- end }}
      secretName: {{ .secretName }}
    {{- end }}
  {{- end }}
  rules:
    {{- range .Values.ingress.hosts }}
    - host: {{ .host | quote }}
      http:
        paths:
          {{- range .paths }}
          - path: {{ .path }}
            pathType: {{ .pathType }}
            backend:
              service:
                {{- if $.Values.frontend.enabled }}
                name: {{ include "site24x7-labs.fullname" $ }}-frontend
                port:
                  name: http
                {{- else }}
                name: {{ include "site24x7-labs.fullname" $ }}-server
                port:
                  name: http
                {{- end }}
          {{- end }}
    {{- end }}
{{- end }}
