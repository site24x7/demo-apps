# ─────────────────────────────────────────────────────────────
# ZylkerKart Storefront — Spring Boot Configuration
# ─────────────────────────────────────────────────────────────

server.port=80

spring.application.name=storefront

# ── Thymeleaf ──
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# ── Redis-backed sessions ──
spring.session.store-type=redis
spring.session.redis.namespace=zylkerkart:session
spring.data.redis.host=${REDIS_HOST:redis}
spring.data.redis.port=${REDIS_PORT:6379}
server.servlet.session.timeout=120m
server.servlet.session.cookie.name=zylkerkart_session

# ── Actuator health ──
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=always

# ── Backend service URLs ──
services.product.url=${PRODUCT_SERVICE_URL:http://product-service:8081}
services.order.url=${ORDER_SERVICE_URL:http://order-service:8082}
services.search.url=${SEARCH_SERVICE_URL:http://search-service:8083}
services.payment.url=${PAYMENT_SERVICE_URL:http://payment-service:8084}
services.auth.url=${AUTH_SERVICE_URL:http://auth-service:8085}

# ── Site24x7 RUM (optional) ──
site24x7.rum.key=${SITE24X7_RUM_KEY:}

# ── Site24x7 Labs Chaos SDK ──
chaos.enabled=${CHAOS_SDK_ENABLED:true}
chaos.app-name=${CHAOS_SDK_APP_NAME:storefront}
chaos.config-file=${CHAOS_SDK_CONFIG_DIR:/var/site24x7-labs/faults}/${CHAOS_SDK_APP_NAME:storefront}.json
