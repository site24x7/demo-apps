<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/app}">
<head><title>Login - ZylkerKart</title></head>
<body>
<div layout:fragment="content">
<style>
    .login-container { max-width: 400px; margin: 60px auto; }
    .login-card { background: #fff; border-radius: 8px; padding: 32px; border: 1px solid #eee; }
    .login-card h2 { text-align: center; margin-bottom: 24px; color: #333; }
    .login-form-group { margin-bottom: 16px; }
    .login-form-group label { display: block; font-size: 13px; color: #555; margin-bottom: 5px; font-weight: 500; }
    .login-form-group input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; box-sizing: border-box; }
    .login-form-group input:focus { border-color: #0073e6; outline: none; }
    .login-error { background: #fff3f3; border: 1px solid #ffcdd2; color: #c62828; padding: 10px 14px; border-radius: 6px; font-size: 13px; margin-bottom: 16px; }
    .login-btn { width: 100%; padding: 14px; background: #0073e6; color: #fff; border: none; border-radius: 6px; font-size: 16px; font-weight: 600; cursor: pointer; }
    .login-btn:hover { background: #005bb5; }
    .login-bottom { text-align: center; margin-top: 16px; color: #888; font-size: 14px; }
    .login-bottom a { color: #0073e6; text-decoration: none; font-weight: 500; }
    .login-demo { margin-top: 20px; background: #f0f7ff; border: 1px solid #bbdefb; border-radius: 8px; padding: 16px; }
    .login-demo h4 { margin: 0 0 8px; color: #1565c0; font-size: 14px; }
    .login-demo p { margin: 4px 0; font-size: 13px; color: #333; }
    .login-demo code { background: #e3f2fd; padding: 2px 6px; border-radius: 3px; font-size: 13px; }
    @media (max-width: 480px) {
        .login-container { margin: 30px 16px; }
        .login-card { padding: 24px; }
        .login-card h2 { font-size: 20px; margin-bottom: 20px; }
    }
</style>

<div class="login-container">
    <div class="login-card">
        <h2>&#128100; Sign In</h2>

        <div class="login-error" th:if="${error}" th:text="${error}">Error message</div>

        <form method="post" action="/login">
            <div class="login-form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" th:value="${email}" placeholder="you@example.com" required>
            </div>
            <div class="login-form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Enter your password" required>
            </div>
            <button type="submit" class="login-btn">Sign In</button>
        </form>

        <div class="login-bottom">
            Don't have an account? <a href="/register">Create Account</a>
        </div>
    </div>

    <div class="login-demo">
        <h4>&#128161; Demo Credentials</h4>
        <p>Email: <code>demo@zylkerkart.com</code></p>
        <p>Password: <code>Demo@123</code></p>
    </div>
</div>
</div>
</body>
</html>
