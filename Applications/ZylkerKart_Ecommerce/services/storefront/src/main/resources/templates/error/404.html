<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/app}">
<head><title>Product Not Found - ZylkerKart</title></head>
<body>
<div layout:fragment="content">
<style>
    .error-container { text-align: center; padding: 80px 20px; max-width: 500px; margin: 0 auto; }
    .error-code { font-size: 96px; font-weight: 800; color: #e0e0e0; line-height: 1; margin-bottom: 10px; }
    .error-title { font-size: 22px; font-weight: 600; color: #333; margin-bottom: 12px; }
    .error-msg { font-size: 15px; color: #777; margin-bottom: 30px; line-height: 1.5; }
    .error-actions { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
    .error-btn { padding: 12px 28px; border-radius: 6px; font-size: 15px; font-weight: 600; text-decoration: none; transition: background 0.2s; }
    .error-btn-primary { background: #0073e6; color: #fff; border: none; }
    .error-btn-primary:hover { background: #005bb5; }
    .error-btn-secondary { background: #fff; color: #0073e6; border: 2px solid #0073e6; }
    .error-btn-secondary:hover { background: #e3f2fd; }
</style>
<div class="error-container">
    <div class="error-code">404</div>
    <h1 class="error-title">Product Not Found</h1>
    <p class="error-msg">The product you're looking for doesn't exist or may have been removed. Try browsing our catalog instead.</p>
    <div class="error-actions">
        <a href="/products" class="error-btn error-btn-primary">Browse Products</a>
        <a href="/" class="error-btn error-btn-secondary">Go Home</a>
    </div>
</div>
</div>
</body>
</html>
