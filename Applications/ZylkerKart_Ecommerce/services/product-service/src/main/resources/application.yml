server:
  port: 8081

spring:
  application:
    name: product-service
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/db_product?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&characterEncoding=utf8mb4
    username: root
    password: ${MYSQL_ROOT_PASSWORD:zylkerkart_root_2026}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
        default_batch_fetch_size: 16

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 5000

  cache:
    type: redis
    redis:
      time-to-live: 600000
      cache-null-values: false

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.zylkerkart.product: INFO
    org.hibernate.SQL: WARN

# Site24x7 Labs Chaos SDK
chaos:
  enabled: ${CHAOS_SDK_ENABLED:true}
  app-name: ${CHAOS_SDK_APP_NAME:product-service}
  config-file: ${CHAOS_SDK_CONFIG_DIR:/var/site24x7-labs/faults}/${CHAOS_SDK_APP_NAME:product-service}.json
